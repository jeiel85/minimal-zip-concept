[package]
name = "mzc"
version = "0.1.0"
edition = "2021"
authors = ["Antigravity"]
description = "Minimal Zip Concept - A learning-oriented lossless compression CLI and GUI tool in Rust"
license = "MIT"
repository = "https://github.com/jeiel85/minimal-zip-concept"
homepage = "https://github.com/jeiel85/minimal-zip-concept"
readme = "README.md"
keywords = ["compression", "lossless", "rle", "lz77", "ans"]
categories = ["compression", "command-line-utilities", "gui"]

[dependencies]
clap = { version = "4.4", features = ["derive"] }
sha2 = "0.10"
anyhow = "1.0"
rayon = "1.8"
eframe = { version = "0.26", default-features = false, features = ["default_fonts", "glow"] }
rfd = "0.12"
egui_plot = "0.26"
flate2 = "1.1.9"
zstd = "0.13.3"

