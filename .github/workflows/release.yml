name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release Asset
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: mzc-linux-x64
            asset_type: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: mzc-windows-x64
            asset_type: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: mzc-macos-x64
            asset_type: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: mzc-macos-arm64
            asset_type: tar.gz

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install system dependencies (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libgtk-3-dev

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        target: ${{ matrix.target }}

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Build release binary
      run: cargo build --release --target ${{ matrix.target }}

    - name: Package Binary (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir dist
        cp target/${{ matrix.target }}/release/mzc.exe dist/
        Compress-Archive -Path dist/* -DestinationPath ${{ matrix.artifact_name }}.zip
        New-Item -ItemType Directory -Force -Path target/release
        Copy-Item target/${{ matrix.target }}/release/mzc.exe target/release/mzc.exe
        iscc installer/setup.iss
        Copy-Item installer/mzc-setup.exe .

    - name: Package Binary (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        mkdir dist
        cp target/${{ matrix.target }}/release/mzc dist/
        tar -czf ${{ matrix.artifact_name }}.tar.gz -C dist mzc
        
        # Build Debian package for x64 Linux
        if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
          mkdir -p debian/DEBIAN
          mkdir -p debian/usr/bin
          cp target/${{ matrix.target }}/release/mzc debian/usr/bin/
          
          # Extract version from tag (e.g. v0.11.1 -> 0.11.1)
          VERSION_DEB=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          
          cat <<EOF > debian/DEBIAN/control
Package: mzc
Version: ${VERSION_DEB}
Section: utils
Priority: optional
Architecture: amd64
Maintainer: jeiel
Description: Minimal Zip Concept (MZC) compression utility
EOF
          
          dpkg-deb --build debian mzc_${VERSION_DEB}_amd64.deb
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          *.zip
          *.tar.gz
          *.deb
          mzc-setup.exe
        if-no-files-found: ignore

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        target: wasm32-unknown-unknown

    - name: Build WASM binary
      run: cargo build --lib --target wasm32-unknown-unknown --release

    - name: Package WASM
      run: |
        mkdir -p wasm-dist
        cp target/wasm32-unknown-unknown/release/mzc.wasm wasm-dist/

    - name: Upload WASM Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mzc-wasm
        path: wasm-dist/mzc.wasm

  create-github-release:
    name: Create GitHub Release
    needs: [build-release, build-wasm]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Create GitHub Release and Upload Assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          */*.tar.gz
          */*.zip
          */*.deb
          */mzc-setup.exe
          */mzc.wasm
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates-io:
    name: Publish to Crates.io
    needs: create-github-release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install system dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libgtk-3-dev

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cargo Publish
      run: cargo publish
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
