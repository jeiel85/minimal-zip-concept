name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release Asset
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: mzc-linux-x64
            asset_type: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: mzc-windows-x64
            asset_type: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: mzc-macos-x64
            asset_type: tar.gz

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install system dependencies (Linux only)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libgtk-3-dev

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        target: ${{ matrix.target }}

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Build release binary
      run: cargo build --release --target ${{ matrix.target }}

    - name: Package Binary (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir dist
        cp target/${{ matrix.target }}/release/mzc.exe dist/
        Compress-Archive -Path dist/* -DestinationPath ${{ matrix.artifact_name }}.zip

    - name: Package Binary (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: |
        mkdir dist
        cp target/${{ matrix.target }}/release/mzc dist/
        tar -czf ${{ matrix.artifact_name }}.tar.gz -C dist mzc

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.artifact_name }}.${{ matrix.asset_type }}

  create-github-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Download all artifacts
      uses: actions/download-artifact@v3

    - name: Create GitHub Release and Upload Assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          mzc-linux-x64/mzc-linux-x64.tar.gz
          mzc-windows-x64/mzc-windows-x64.zip
          mzc-macos-x64/mzc-macos-x64.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
