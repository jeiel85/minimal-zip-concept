name: Weekly Fuzz Testing

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (Nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Install GTK development libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev libx11-dev libasound2-dev

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run Fuzzer
        run: |
          cargo fuzz run decompress -- -max_total_time=600
